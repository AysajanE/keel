name: Install Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "22 9 * * *"

jobs:
  check-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check installer without cloning private dependencies
        run: ./install.sh --check
