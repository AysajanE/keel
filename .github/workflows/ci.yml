name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate manifest
        run: python3 scripts/manifest.py validate
      - name: Public hygiene
        run: python3 scripts/public_hygiene.py
      - name: Shell syntax
        run: bash -n bin/keel-* install.sh uninstall.sh
      - name: Shellcheck
        run: shellcheck bin/keel-* install.sh uninstall.sh
      - name: Installer check
        run: ./install.sh --check
