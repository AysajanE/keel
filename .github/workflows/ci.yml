name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hygiene:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install shellcheck on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Install shellcheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Validate manifest
        run: python3 scripts/manifest.py validate
      - name: Public hygiene
        run: python3 scripts/public_hygiene.py
      - name: Shell syntax
        run: bash -n bin/keel-* install.sh uninstall.sh
      - name: Shellcheck
        run: shellcheck bin/keel-* install.sh uninstall.sh
      - name: Installer check
        run: ./install.sh --check
