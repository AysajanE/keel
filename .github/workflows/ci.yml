name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hygiene:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install shellcheck on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Install shellcheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Validate manifest
        run: python3 scripts/manifest.py validate
      - name: Public hygiene
        run: python3 scripts/public_hygiene.py
      - name: Shell syntax
        run: bash -n bin/keel-* install.sh uninstall.sh
      - name: Shellcheck
        run: shellcheck bin/keel-* install.sh uninstall.sh
      - name: Installer check
        run: ./install.sh --check
